name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      - name: Package VSIX
        run: npx @vscode/vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: secotron-color-theme-${{ github.sha }}
          path: '*.vsix'
          retention-days: 7
