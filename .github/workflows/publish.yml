name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # checkov:skip=CKV_GHA_7:dry_run controls publish step only, not the build artifact
    inputs:
      dry_run:
        description: "Dry run (package only, skip publish)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm test

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Publish to VS Code Marketplace
        if: ${{ !inputs.dry_run }}
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
