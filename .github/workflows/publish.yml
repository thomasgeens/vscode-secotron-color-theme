name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # checkov:skip=CKV_GHA_7:dry_run controls publish step only, not the build artifact
    inputs:
      dry_run:
        description: "Dry run (package only, skip publish)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm test

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Publish to VS Code Marketplace
        if: ${{ !inputs.dry_run }}
        run: |
          output=$(npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already exists"; then
              echo "Version already published on marketplace — skipping."
            else
              echo "$output" >&2; exit 1
            fi
          }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
          generate_release_notes: true

      - name: Job summary
        if: always()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE=$(ls *.vsix 2>/dev/null | head -1)
          VSIX_SIZE=$(du -sh "$VSIX_FILE" 2>/dev/null | cut -f1 || echo "—")
          TAG="${{ github.ref_name }}"
          DRY_RUN="${{ inputs.dry_run }}"
          {
            echo "## Stable Release"
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | \`$VERSION\` |"
            echo "| **VSIX** | \`$VSIX_FILE\` ($VSIX_SIZE) |"
            echo "| **Tag** | \`$TAG\` |"
            if [ "$DRY_RUN" = "true" ]; then
              echo "| **Published** | ⚠️ Dry run — skipped |"
            else
              echo "| **Published** | ✅ [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=SECOTRON.secotron-color-theme) |"
            fi
            if [[ "$TAG" == v* ]]; then
              echo "| **Release** | [$TAG](${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
